<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עדכון פרטים - VIP Shirts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap');

        :root {
            --primary-color: #1a1a1a;
            --bg-color: #f4f7f6;
            --border-color: #e1e1e1;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent: #0984e3;
            --success: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            direction: rtl;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1); 
        }

        .logo { text-align: center; margin-bottom: 30px; }
        .logo img { width: 130px; height: auto; }

        h1 { font-weight: 800; font-size: 1.7rem; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; }

        /* Form Styles */
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.9rem; }
        .form-group input {
            width: 100%; padding: 13px; border: 1.5px solid var(--border-color);
            border-radius: 10px; font-family: inherit; font-size: 1rem; transition: 0.2s;
        }
        .form-group input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }

        .address-section { border-top: 1px solid #eee; margin-top: 25px; padding-top: 20px; }
        .address-section h3 { font-size: 1rem; margin-bottom: 15px; }
        .address-row { display: flex; gap: 12px; }

        .btn-primary {
            width: 100%; padding: 16px; background: var(--primary-color); color: white;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1.1rem; margin-top: 10px;
        }

        /* Info & Orders Section */
        .info-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 30px; }
        .stat-card { 
            background: #f8f9fa; padding: 15px; border-radius: 12px; 
            border-right: 5px solid var(--primary-color); margin-bottom: 25px;
        }
        .stat-value { font-size: 1.6rem; font-weight: 800; color: var(--primary-color); }

        .list-title { font-weight: 800; margin-bottom: 15px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        
        /* Order Item Styling */
        .order-box {
            background: white; border: 1px solid #eee; border-radius: 10px;
            margin-bottom: 12px; overflow: hidden; transition: 0.3s;
        }
        .order-summary {
            padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .order-summary:hover { background: #fdfdfd; }
        .order-details {
            padding: 0 15px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: #fafafa;
        }
        .order-box.active .order-details { max-height: 500px; padding: 15px; border-top: 1px solid #eee; }
        
        .items-list { list-style: none; padding-right: 15px; margin: 10px 0; border-right: 2px solid #ddd; }
        .items-list li { font-size: 0.9rem; margin-bottom: 5px; color: #444; }

        .tag { padding: 3px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; }
        .tag-success { background: #eafff2; color: #27ae60; }
        .tag-pending { background: #fff5e6; color: #d35400; }

        .message { padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; display: none; font-weight: 600; }
        .error { background: #ffeaea; color: #c0392b; display: block; }
        .success { background: #eafff2; color: #27ae60; display: block; }

        @media (max-width: 500px) { .container { padding: 25px; box-shadow: none; } body { background: white; } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <img src="https://i.postimg.cc/XYRrh5bT/3554E7D6-78B2-43C1-947D-CD4B1D37A560.png" alt="VIP Shirts">
    </div>

    <div id="status-msg"></div>

    <div id="loading-state" style="text-align:center; padding: 20px;">טוען נתונים...</div>

    <div id="main-content" style="display:none;">
        <h1>שלום, <span id="user-greeting">...</span></h1>
        <p class="subtitle">עדכון פרטי חשבון וצפייה בהזמנות</p>

        <form id="update-form">
            <div class="form-group">
                <label>שם מלא *</label>
                <input type="text" id="field-name" required>
            </div>
            <div class="form-group">
                <label>טלפון *</label>
                <input type="tel" id="field-phone" required>
            </div>
            <div class="form-group">
                <label>סיסמה חדשה (השאר ריק אם אין שינוי)</label>
                <input type="password" id="field-pass" minlength="6">
            </div>

            <div class="address-section">
                <h3>כתובת למשלוח</h3>
                <div class="address-row">
                    <div class="form-group" style="flex:3">
                        <label>רחוב</label>
                        <input type="text" id="field-street">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>מס'</label>
                        <input type="text" id="field-house">
                    </div>
                </div>
                <div class="address-row">
                    <div class="form-group" style="flex:1">
                        <label>עיר</label>
                        <input type="text" id="field-city">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>מיקוד</label>
                        <input type="text" id="field-zip">
                    </div>
                </div>
            </div>
            <button type="submit" class="btn-primary" id="save-btn">עדכן את כל הפרטים</button>
        </form>

        <div class="info-section">
            <div class="stat-card">
                <div style="font-size: 0.9rem; color: var(--text-muted);">נקודות במועדון</div>
                <div class="stat-value" id="stat-points">0</div>
            </div>

            <div class="list-title">🛍️ הזמנות אחרונות (לחץ לפרטים)</div>
            <div id="orders-container"></div>

            <div class="list-title" style="margin-top:25px;">💬 פניות לשירות</div>
            <div id="leads-container"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDLHENaXTeorjL87sExB1EJrH7mrEnNYOA",
        authDomain: "timetable-titus.firebaseapp.com",
        projectId: "timetable-titus",
        storageBucket: "timetable-titus.firebasestorage.app",
        messagingSenderId: "199146911555",
        appId: "1:199146911555:web:5d9436d716dfc6de7361f6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let userData = null;

    function showStatus(text, type) {
        const box = document.getElementById('status-msg');
        box.innerHTML = `<div class="message ${type}">${text}</div>`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function init() {
        const hash = window.location.hash.substring(1);
        if (!hash) {
            document.getElementById('loading-state').innerHTML = '<div class="message error">לקוח לא נבחר</div>';
            return;
        }

        const email = decodeURIComponent(hash);

        try {
            const snap = await db.collection('ClubMembers').where('email', '==', email).limit(1).get();
            if (snap.empty) {
                document.getElementById('loading-state').innerHTML = '<div class="message error">לקוח לא קיים</div>';
                return;
            }

            userData = { id: snap.docs[0].id, ...snap.docs[0].data() };
            
            // מילוי שדות
            document.getElementById('user-greeting').textContent = userData.name || 'לקוח';
            document.getElementById('field-name').value = userData.name || '';
            document.getElementById('field-phone').value = userData.phone || '';
            document.getElementById('stat-points').textContent = userData.points || 0;

            // פירוק כתובת (לוגיקה חכמה לפי המחרוזת שנשמרת)
            if (userData.address) {
                const addr = userData.address.split(',');
                document.getElementById('field-city').value = addr[1]?.trim() || '';
                const streetInfo = addr[0]?.trim().split(' ');
                if (streetInfo) {
                    const house = streetInfo.pop();
                    document.getElementById('field-house').value = house || '';
                    document.getElementById('field-street').value = streetInfo.join(' ') || '';
                }
            }
            
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            loadOrders(userData.id);
            loadLeads(userData.email);

        } catch (e) {
            showStatus("שגיאת טעינה", "error");
        }
    }

    async function loadOrders(memberId) {
        const container = document.getElementById('orders-container');
        try {
            const snap = await db.collection('orders').where('clubMemberId', '==', memberId).get();
            if (snap.empty) {
                container.innerHTML = '<p style="color:#999; font-size:0.9rem;">אין הזמנות קודמות.</p>';
                return;
            }

            const orders = snap.docs.map(doc => ({id: doc.id, ...doc.data()}))
                .sort((a,b) => (b.orderDate?.toDate() || 0) - (a.orderDate?.toDate() || 0));

            container.innerHTML = orders.map(order => {
                const date = order.orderDate ? order.orderDate.toDate().toLocaleDateString('he-IL') : '---';
                const itemsHtml = order.items ? order.items.map(i => `<li>${i.quantity}x ${i.productName || i.name}</li>`).join('') : 'אין פירוט';
                
                return `
                    <div class="order-box" onclick="this.classList.toggle('active')">
                        <div class="order-summary">
                            <div>
                                <strong>#${order.id.substring(0,6)}</strong>
                                <div style="font-size:0.8rem; color:#666;">${date}</div>
                            </div>
                            <div style="text-align:left">
                                <div style="font-weight:800">₪${(order.totalAmount || 0).toFixed(2)}</div>
                                <span class="tag ${order.completed ? 'tag-success' : 'tag-pending'}">
                                    ${order.completed ? 'בוצע' : 'בטיפול'}
                                </span>
                            </div>
                        </div>
                        <div class="order-details">
                            <div style="font-weight:700; font-size:0.85rem; margin-bottom:5px;">פירוט מוצרים:</div>
                            <ul class="items-list">${itemsHtml}</ul>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (e) { container.innerHTML = 'שגיאה בטעינת הזמנות'; }
    }

    async function loadLeads(email) {
        const container = document.getElementById('leads-container');
        try {
            const snap = await db.collection('ContactLeads').where('email', '==', email).get();
            if (snap.empty) {
                container.innerHTML = '<p style="color:#999; font-size:0.9rem;">אין פניות פתוחות.</p>';
                return;
            }

            const leads = snap.docs.map(doc => ({id: doc.id, ...doc.data()}))
                .sort((a,b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0));

            container.innerHTML = leads.map(lead => `
                <div style="background:#fff; border:1px solid #eee; padding:12px; border-radius:10px; margin-bottom:10px;">
                    <div style="display:flex; justify-content:space-between; font-size:0.85rem;">
                        <strong>פנייה משנת ${lead.createdAt ? lead.createdAt.toDate().toLocaleDateString('he-IL') : ''}</strong>
                        <span style="color:${lead.status === 'closed' ? 'green' : '#e67e22'}">${lead.status === 'closed' ? 'סגור' : 'בטיפול'}</span>
                    </div>
                    <div style="font-size:0.9rem; margin-top:5px;">${lead.message || ''}</div>
                </div>
            `).join('');
        } catch (e) { container.innerHTML = 'שגיאה'; }
    }

    document.getElementById('update-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.textContent = "שומר...";

        try {
            const fullAddress = `${document.getElementById('field-street').value} ${document.getElementById('field-house').value}, ${document.getElementById('field-city').value}`;
            
            const upData = {
                name: document.getElementById('field-name').value,
                phone: document.getElementById('field-phone').value,
                address: fullAddress
            };

            const pass = document.getElementById('field-pass').value;
            if (pass.length >= 6) upData.password = pass;

            await db.collection('ClubMembers').doc(userData.id).update(upData);
            showStatus("הפרטים עודכנו בהצלחה!", "success");
        } catch (e) {
            showStatus("שגיאה בעדכון", "error");
        } finally {
            btn.disabled = false;
            btn.textContent = "עדכן את כל הפרטים";
        }
    };

    window.onload = init;
</script>

</body>
</html>
