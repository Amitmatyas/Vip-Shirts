<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עדכון פרטים - VIP Shirts</title>
    <style>
        :root {
            --primary-color: #1a1a1a; /* שחור מקצועי */
            --accent-color: #3498db;  /* כחול עדין לפוקוס */
            --bg-color: #fcfcfc;      /* לבן כמעט מלא */
            --border-color: #eaeaea;  /* גבולות עדינים מאוד */
            --text-main: #2d3436;
            --text-muted: #636e72;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Heebo', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            direction: rtl;
        }

        .container {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px; /* קימור מעודן יותר */
            padding: 48px;
            max-width: 460px;
            width: 100%;
            /* צללית "רכה" (Soft UI) */
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo img {
            width: 80px; /* קטן ואלגנטי יותר */
            height: auto;
            filter: grayscale(1); /* אופציונלי: הופך את הלוגו לשחור לבן למראה נקי */
            opacity: 0.9;
        }

        h1 {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-main);
            text-transform: uppercase; /* מראה יותר "בוטיקי" */
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: #fff;
            transition: all 0.2s ease-in-out;
            color: var(--text-main);
        }

        .form-group input:focus {
            border-color: var(--primary-color); /* פוקוס שחור סולידי */
            outline: none;
            background-color: #fff;
        }

        .form-group input::placeholder {
            color: #bdc3c7;
        }

        /* עיצוב מחדש של אזור הכתובת */
        .address-section {
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
            margin-top: 32px;
            margin-bottom: 32px;
        }

        .address-section h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .address-row {
            display: flex;
            gap: 16px;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-primary:disabled {
            background-color: #dfe6e9;
            color: #b2bec3;
            cursor: not-allowed;
        }

        /* הודעות מערכת נקיות */
        .message {
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }

        .message.success {
            background-color: #f1fcf4;
            color: #1b5e20;
            border: 1px solid #c8e6c9;
        }

        .message.error {
            background-color: #fff5f5;
            color: #c0392b;
            border: 1px solid #fadbd8;
        }

        .loading-spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
                border: none;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://i.postimg.cc/XYRrh5bT/3554E7D6-78B2-43C1-947D-CD4B1D37A560.png" alt="VIP Shirts">
        </div>

        <h1>עדכון פרטי חשבון</h1>
        <p class="subtitle">עדכן את הפרטים שלך במועדון VIP</p>

        <div id="loading-state" class="loading">
            <div class="loading-spinner"></div>
            <p>טוען פרטים...</p>
        </div>

        <div id="message" class="message"></div>

        <form id="customer-form" style="display: none;">
            <div class="form-group">
                <label>שם מלא *</label>
                <input type="text" id="customer-name" required>
            </div>

            <div class="form-group">
                <label>אימייל *</label>
                <input type="email" id="customer-email" disabled>
            </div>

            <div class="form-group">
                <label>טלפון *</label>
                <input type="tel" id="customer-phone" required>
            </div>

            <div class="form-group">
                <label>סיסמה חדשה (השאר ריק אם לא רוצה לשנות)</label>
                <input type="password" id="customer-password" minlength="6">
            </div>

            <div class="address-section">
                <h3>כתובת (אופציונלי)</h3>
                
                <div class="address-row">
                    <div class="form-group">
                        <label>רחוב</label>
                        <input type="text" id="customer-street">
                    </div>
                    <div class="form-group small">
                        <label>מספר</label>
                        <input type="text" id="customer-house">
                    </div>
                </div>

                <div class="address-row">
                    <div class="form-group">
                        <label>עיר</label>
                        <input type="text" id="customer-city">
                    </div>
                    <div class="form-group small">
                        <label>מיקוד</label>
                        <input type="text" id="customer-zip">
                    </div>
                </div>

                <div class="form-group">
                    <label>מדינה</label>
                    <input type="text" id="customer-country" value="ישראל">
                </div>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">עדכן פרטים</button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDLHENaXTeorjL87sExB1EJrH7mrEnNYOA",
            authDomain: "timetable-titus.firebaseapp.com",
            projectId: "timetable-titus",
            storageBucket: "timetable-titus.firebasestorage.app",
            messagingSenderId: "199146911555",
            appId: "1:199146911555:web:5d9436d716dfc6de7361f6",
            measurementId: "G-JQ02VEC325"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentMember = null;

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        async function loadCustomerData() {
            const hash = window.location.hash.substring(1);
            const email = decodeURIComponent(hash);

            if (!email) {
                showMessage('לא נמצא אימייל בכתובת', 'error');
                document.getElementById('loading-state').style.display = 'none';
                return;
            }

            try {
                const membersSnapshot = await db.collection('ClubMembers')
                    .where('email', '==', email)
                    .limit(1)
                    .get();

                if (membersSnapshot.empty) {
                    showMessage('לקוח לא נמצא במערכת', 'error');
                    document.getElementById('loading-state').style.display = 'none';
                    return;
                }

                const memberDoc = membersSnapshot.docs[0];
                currentMember = { id: memberDoc.id, ...memberDoc.data() };

                // Fill form
                document.getElementById('customer-name').value = currentMember.name || '';
                document.getElementById('customer-email').value = currentMember.email || '';
                document.getElementById('customer-phone').value = currentMember.phone || '';

                // Parse address
                if (currentMember.address) {
                    const addressParts = currentMember.address.split(',').map(p => p.trim());
                    
                    if (addressParts.length >= 3) {
                        const streetHouse = addressParts[0].trim();
                        const houseMatch = streetHouse.match(/\s+(\d+[א-ת]?)$/);
                        
                        if (houseMatch) {
                            document.getElementById('customer-house').value = houseMatch[1];
                            document.getElementById('customer-street').value = streetHouse.replace(/\s+\d+[א-ת]?$/, '').trim();
                        } else {
                            document.getElementById('customer-street').value = streetHouse;
                        }
                        
                        document.getElementById('customer-city').value = addressParts[1] || '';
                        
                        const countryZip = addressParts[2].trim().split(/\s+/);
                        const lastPart = countryZip[countryZip.length - 1];
                        
                        if (lastPart && /^\d+$/.test(lastPart)) {
                            document.getElementById('customer-zip').value = lastPart;
                            document.getElementById('customer-country').value = countryZip.slice(0, -1).join(' ') || 'ישראל';
                        } else {
                            document.getElementById('customer-country').value = addressParts[2] || 'ישראל';
                        }
                    }
                }

                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('customer-form').style.display = 'block';

            } catch (error) {
                console.error('Error loading customer:', error);
                showMessage('שגיאה בטעינת נתונים', 'error');
                document.getElementById('loading-state').style.display = 'none';
            }
        }

        document.getElementById('customer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentMember) return;

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'שומר...';

            try {
                const name = document.getElementById('customer-name').value.trim();
                const phone = document.getElementById('customer-phone').value.trim();
                const password = document.getElementById('customer-password').value;

                // Build address
                const street = document.getElementById('customer-street').value.trim();
                const house = document.getElementById('customer-house').value.trim();
                const city = document.getElementById('customer-city').value.trim();
                const zip = document.getElementById('customer-zip').value.trim();
                const country = document.getElementById('customer-country').value.trim();
                
                let address = '';
                if (street || house || city) {
                    address = `${street} ${house}, ${city}, ${country} ${zip}`.trim();
                }

                const updateData = {
                    name: name,
                    phone: phone,
                    address: address
                };

                // Update password only if provided
                if (password && password.length >= 6) {
                    updateData.password = password;
                }

                await db.collection('ClubMembers').doc(currentMember.id).update(updateData);

                showMessage('הפרטים עודכנו בהצלחה!', 'success');
                
                // Clear password field
                document.getElementById('customer-password').value = '';

            } catch (error) {
                console.error('Error updating customer:', error);
                showMessage('שגיאה בעדכון פרטים', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'עדכן פרטים';
            }
        });

        // Load data on page load
        window.addEventListener('load', loadCustomerData);
        window.addEventListener('hashchange', loadCustomerData);
    </script>
</body>
</html>
