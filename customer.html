<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עדכון פרטים - VIP Shirts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap');

        :root {
            --primary-color: #1a1a1a;
            --bg-color: #f4f7f6;
            --border-color: #e1e1e1;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent: #0984e3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            direction: rtl;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1); 
        }

        .logo { text-align: center; margin-bottom: 30px; }
        .logo img { width: 120px; height: auto; }

        h1 { font-weight: 800; font-size: 1.6rem; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; }

        /* Form Styles */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
        .form-group input {
            width: 100%; padding: 12px; border: 1.5px solid var(--border-color);
            border-radius: 8px; font-family: inherit; font-size: 1rem;
        }
        .form-group input:focus { border-color: var(--primary-color); outline: none; }

        .address-row { display: flex; gap: 10px; }

        .btn-primary {
            width: 100%; padding: 15px; background: var(--primary-color); color: white;
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1rem;
        }

        /* Info Cards Section */
        .info-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 30px; }
        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 12px; border-right: 4px solid var(--primary-color); }
        .stat-card h3 { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        .stat-value { font-size: 1.4rem; font-weight: 800; }

        .list-container { margin-top: 20px; }
        .list-title { font-weight: 700; margin-bottom: 10px; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        
        .item-row { 
            background: white; border: 1px solid #eee; padding: 12px; border-radius: 8px; 
            margin-bottom: 10px; font-size: 0.9rem;
        }
        .item-header { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 5px; }
        .item-details { color: var(--text-muted); font-size: 0.85rem; }

        .tag { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
        .tag-success { background: #eafff2; color: #27ae60; }
        .tag-pending { background: #fff5e6; color: #d35400; }

        .message { padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
        .error { background: #fee; color: #c0392b; }
        .success { background: #eafff2; color: #27ae60; }

        @media (max-width: 500px) { .container { padding: 25px; box-shadow: none; } body { background: white; } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <img src="https://i.postimg.cc/XYRrh5bT/3554E7D6-78B2-43C1-947D-CD4B1D37A560.png" alt="VIP Shirts">
    </div>

    <div id="loading-state" style="text-align:center;">טוען נתונים...</div>
    <div id="main-content" style="display:none;">
        <h1>שלום, <span id="user-greeting">אורח</span></h1>
        <p class="subtitle">עדכון פרטים וצפייה בפעילות</p>

        <div id="message-box" class="message"></div>

        <form id="update-form">
            <div class="form-group">
                <label>שם מלא</label>
                <input type="text" id="field-name" required>
            </div>
            <div class="form-group">
                <label>טלפון</label>
                <input type="tel" id="field-phone" required>
            </div>
            <div class="address-row">
                <div class="form-group" style="flex:2">
                    <label>עיר</label>
                    <input type="text" id="field-city">
                </div>
                <div class="form-group" style="flex:1">
                    <label>מיקוד</label>
                    <input type="text" id="field-zip">
                </div>
            </div>
            <button type="submit" class="btn-primary" id="save-btn">שמור שינויים</button>
        </form>

        <div class="info-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>נקודות VIP שנצברו</h3>
                    <div class="stat-value" id="stat-points">0</div>
                </div>
            </div>

            <div class="list-container">
                <div class="list-title">🛍️ הזמנות אחרונות</div>
                <div id="orders-container"></div>
            </div>

            <div class="list-container">
                <div class="list-title">💬 פניות לשירות</div>
                <div id="leads-container"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDLHENaXTeorjL87sExB1EJrH7mrEnNYOA",
        authDomain: "timetable-titus.firebaseapp.com",
        projectId: "timetable-titus",
        storageBucket: "timetable-titus.firebasestorage.app",
        messagingSenderId: "199146911555",
        appId: "1:199146911555:web:5d9436d716dfc6de7361f6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let userData = null;

    async function init() {
        const hash = window.location.hash.substring(1);
        const msgBox = document.getElementById('message-box');
        
        if (!hash) {
            document.getElementById('loading-state').innerHTML = '<p class="error" style="display:block">לקוח לא נבחר (חסר מזהה בקישור)</p>';
            return;
        }

        const email = decodeURIComponent(hash);

        try {
            const snap = await db.collection('ClubMembers').where('email', '==', email).limit(1).get();
            
            if (snap.empty) {
                document.getElementById('loading-state').innerHTML = '<p class="error" style="display:block">לקוח לא נמצא במערכת</p>';
                return;
            }

            userData = { id: snap.docs[0].id, ...snap.docs[0].data() };
            
            // מילוי שדות
            document.getElementById('user-greeting').textContent = userData.name.split(' ')[0];
            document.getElementById('field-name').value = userData.name || '';
            document.getElementById('field-phone').value = userData.phone || '';
            document.getElementById('stat-points').textContent = userData.points || 0;
            
            // הצגת התוכן
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // טעינת מידע נוסף
            loadOrders(userData.id);
            loadLeads(userData.email);

        } catch (e) {
            console.error(e);
            msgBox.textContent = "שגיאה בטעינת נתונים";
            msgBox.className = "message error";
            msgBox.style.display = "block";
        }
    }

    async function loadOrders(memberId) {
        const container = document.getElementById('orders-container');
        try {
            const snap = await db.collection('orders').where('clubMemberId', '==', memberId).get();
            if (snap.empty) {
                container.innerHTML = '<p style="font-size:0.8rem; color:#999;">טרם בוצעו הזמנות.</p>';
                return;
            }

            const orders = snap.docs.map(doc => ({id: doc.id, ...doc.data()}))
                .sort((a,b) => (b.orderDate?.toDate() || 0) - (a.orderDate?.toDate() || 0));

            container.innerHTML = orders.slice(0, 3).map(order => `
                <div class="item-row">
                    <div class="item-header">
                        <span>הזמנה #${order.id.substring(0,6)}</span>
                        <span class="tag ${order.completed ? 'tag-success' : 'tag-pending'}">
                            ${order.completed ? 'הושלם' : 'בטיפול'}
                        </span>
                    </div>
                    <div class="item-details">
                        תאריך: ${order.orderDate ? order.orderDate.toDate().toLocaleDateString('he-IL') : '---'}<br>
                        סה"כ: ₪${(order.totalAmount || 0).toFixed(2)}
                    </div>
                </div>
            `).join('');
        } catch (e) { container.innerHTML = 'שגיאה בטעינת הזמנות'; }
    }

    async function loadLeads(email) {
        const container = document.getElementById('leads-container');
        try {
            const snap = await db.collection('ContactLeads').where('email', '==', email).get();
            if (snap.empty) {
                container.innerHTML = '<p style="font-size:0.8rem; color:#999;">אין פניות קודמות.</p>';
                return;
            }

            const leads = snap.docs.map(doc => ({id: doc.id, ...doc.data()}))
                .sort((a,b) => (b.createdAt?.toDate() || 0) - (a.createdAt?.toDate() || 0));

            container.innerHTML = leads.slice(0, 2).map(lead => `
                <div class="item-row">
                    <div class="item-header">
                        <span>פנייה מ-${lead.createdAt ? lead.createdAt.toDate().toLocaleDateString('he-IL') : ''}</span>
                        <span style="font-size:0.7rem; color:${lead.status === 'closed' ? 'green' : 'orange'}">
                            ${lead.status === 'closed' ? '✓ סגור' : '⏳ פתוח'}
                        </span>
                    </div>
                    <div style="font-size:0.8rem; margin-top:5px; color:#444;">${lead.message || ''}</div>
                </div>
            `).join('');
        } catch (e) { container.innerHTML = 'שגיאה בטעינת פניות'; }
    }

    document.getElementById('update-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.textContent = "שומר...";

        try {
            await db.collection('ClubMembers').doc(userData.id).update({
                name: document.getElementById('field-name').value,
                phone: document.getElementById('field-phone').value
                // ניתן להוסיף כאן עדכון כתובת אם תרצה
            });
            const msgBox = document.getElementById('message-box');
            msgBox.textContent = "הפרטים עודכנו בהצלחה!";
            msgBox.className = "message success";
            msgBox.style.display = "block";
            setTimeout(() => msgBox.style.display = 'none', 3000);
        } catch (e) {
            alert("שגיאה בעדכון");
        } finally {
            btn.disabled = false;
            btn.textContent = "שמור שינויים";
        }
    };

    window.onload = init;
</script>

</body>
</html>
