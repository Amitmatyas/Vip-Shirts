<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הגדרות ספירה לאחור – VIP Shirts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #181818;
  --surface3: #222222;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.18);
  --text: #f5f5f5;
  --text2: #aaaaaa;
  --text3: #555555;
  --accent: #ffffff;
  --radius: 14px;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 48px 20px 100px;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

/* ── Header ── */
.page-header {
  max-width: 660px; margin: 0 auto 56px;
  display: flex; align-items: center; gap: 18px;
  animation: fadeSlideIn 0.5s ease both;
}
.logo-mark {
  width: 44px; height: 44px;
  border: 1.5px solid var(--border-strong); border-radius: 10px;
  display: grid; place-items: center; font-size: 1.2em;
  flex-shrink: 0; background: var(--surface);
}
.page-title { font-size: 1.25em; font-weight: 700; letter-spacing: -0.3px; }
.page-sub   { font-size: 0.78em; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }

/* ── Cards ── */
.card {
  max-width: 660px; margin: 0 auto 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  transition: border-color 0.25s; animation: fadeSlideIn 0.5s ease both;
}
.card:nth-child(2){animation-delay:.06s}.card:nth-child(3){animation-delay:.12s}
.card:nth-child(4){animation-delay:.18s}.card:nth-child(5){animation-delay:.24s}
.card:nth-child(6){animation-delay:.30s}.card:nth-child(7){animation-delay:.36s}
.card:focus-within { border-color: var(--border-strong); }

.card-header {
  padding: 18px 22px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
}
.card-icon {
  width: 32px; height: 32px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  display: grid; place-items: center; font-size: 0.9em; flex-shrink: 0;
}
.card-title { font-size: 0.9em; font-weight: 700; letter-spacing: 0.2px; }
.card-body  { padding: 22px; }

/* ── Fields ── */
.field-group { margin-bottom: 18px; }
.field-group:last-child { margin-bottom: 0; }

label {
  display: block; font-size: 0.72em; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
  font-family: 'DM Mono', monospace;
}

input[type="text"], input[type="datetime-local"], textarea, select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 9px; padding: 11px 14px; font-size: 0.92em;
  font-family: 'Heebo', sans-serif; color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s; outline: none; direction: rtl;
  appearance: none;
}
input::placeholder, textarea::placeholder { color: var(--text3); }
input:focus, textarea:focus, select:focus {
  border-color: rgba(255,255,255,0.35);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
}
select option { background: var(--surface2); }
textarea { min-height: 70px; resize: vertical; }
.hint { font-size: 0.72em; color: var(--text3); margin-top: 6px; font-family: 'DM Mono', monospace; }

/* ── Toggle ── */
.toggle-row { display: flex; justify-content: space-between; align-items: center; }
.toggle-info { flex: 1; }
.toggle-label { font-size: 0.9em; font-weight: 600; }
.toggle { position: relative; width: 46px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; inset: 0; background: var(--surface3);
  border: 1px solid var(--border-strong); border-radius: 24px; cursor: pointer;
  transition: background 0.3s, border-color 0.3s;
}
.slider::before {
  content: ''; position: absolute; width: 18px; height: 18px;
  left: 2px; top: 2px; background: var(--text3); border-radius: 50%;
  transition: transform 0.3s, background 0.3s;
}
input:checked + .slider { background: var(--text); border-color: var(--text); }
input:checked + .slider::before { transform: translateX(22px); background: var(--bg); }

/* ── Color ── */
.color-row { display: flex; align-items: center; gap: 10px; }
.color-row input[type="color"] {
  width: 42px; height: 42px; padding: 2px; border-radius: 9px;
  border: 1px solid var(--border-strong); cursor: pointer;
  background: var(--surface2); flex-shrink: 0;
}
.color-row input[type="text"] { flex: 1; }

/* ── Upload ── */
.upload-zone {
  border: 1.5px dashed var(--border-strong); border-radius: 10px;
  padding: 28px 20px; text-align: center; cursor: pointer;
  transition: border-color 0.25s, background 0.25s;
  position: relative; overflow: hidden; background: var(--surface2);
}
.upload-zone:hover { border-color: rgba(255,255,255,0.4); background: var(--surface3); }
.upload-zone.drag-over { border-color: var(--accent); background: rgba(255,255,255,0.04); }
.upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 1.8em; margin-bottom: 8px; }
.upload-text { font-size: 0.85em; color: var(--text2); font-weight: 600; }
.upload-sub  { font-size: 0.72em; color: var(--text3); margin-top: 4px; font-family: 'DM Mono', monospace; }

.upload-progress { margin-top: 14px; display: none; align-items: center; gap: 10px; }
.upload-progress.active { display: flex; }
.progress-bar-track { flex: 1; height: 3px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.progress-bar-fill {
  height: 100%; width: 0%; border-radius: 99px; transition: width 0.3s ease;
  background: linear-gradient(90deg,rgba(255,255,255,0.3) 0%,rgba(255,255,255,1) 50%,rgba(255,255,255,0.3) 100%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite;
}
.progress-label { font-size: 0.72em; color: var(--text3); font-family: 'DM Mono', monospace; white-space: nowrap; }

.img-preview-wrap { margin-top: 14px; border-radius: 9px; overflow: hidden; border: 1px solid var(--border); display: none; position: relative; }
.img-preview-wrap img { width: 100%; height: 160px; object-fit: cover; display: block; filter: grayscale(40%) brightness(0.7); }
.img-clear-btn {
  position: absolute; top: 8px; left: 8px; width: 26px; height: 26px;
  background: rgba(0,0,0,0.7); border: 1px solid var(--border-strong);
  border-radius: 50%; cursor: pointer; display: grid; place-items: center;
  font-size: 0.75em; color: var(--text2); transition: background 0.2s, color 0.2s; z-index: 2;
}
.img-clear-btn:hover { background: #000; color: var(--text); }

.divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 18px; }

/* ── Shirt Picker ── */
.shirt-pick-row {
  display: flex; gap: 8px; align-items: stretch;
}
.shirt-pick-row input {
  flex: 1;
}
.pick-btn {
  background: var(--surface3); border: 1px solid var(--border-strong);
  color: var(--text2); border-radius: 9px; padding: 0 14px;
  font-size: 0.82em; font-family: 'Heebo', sans-serif; cursor: pointer;
  white-space: nowrap; transition: background 0.2s, color 0.2s; flex-shrink: 0;
}
.pick-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

.shirt-selected-preview {
  margin-top: 10px; display: none;
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px;
  display: none; align-items: center; gap: 12px;
}
.shirt-selected-preview.visible { display: flex; }
.shirt-selected-preview img { width: 48px; height: 48px; object-fit: contain; border-radius: 6px; background: #222; flex-shrink: 0; }
.shirt-selected-name { font-size: 0.85em; font-weight: 600; color: var(--text); flex: 1; }
.shirt-remove-btn {
  background: none; border: none; color: var(--text3); cursor: pointer;
  font-size: 1.1em; padding: 4px; transition: color 0.2s;
}
.shirt-remove-btn:hover { color: #ff6b6b; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.shirt-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
}
.shirt-card-title {
  font-size: 0.72em; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1.2px;
  font-family: 'DM Mono', monospace; margin-bottom: 14px;
}

/* ── Matches Accordion ── */
.matches-list { display: flex; flex-direction: column; gap: 8px; }

.match-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  transition: border-color 0.2s;
}
.match-item.has-shirts { border-color: rgba(255,255,255,0.22); }

.match-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; cursor: pointer; user-select: none;
  transition: background 0.15s;
}
.match-header:hover { background: rgba(255,255,255,0.03); }

.match-teams-preview {
  flex: 1; display: flex; align-items: center; gap: 8px;
}
.match-team-logo { width: 22px; height: 22px; object-fit: contain; }
.match-team-name { font-size: 0.85em; font-weight: 600; color: var(--text); }
.match-vs { font-size: 0.72em; color: var(--text3); margin: 0 4px; }
.match-date-badge {
  font-size: 0.68em; font-family: 'DM Mono', monospace; color: var(--text3);
  background: var(--surface3); padding: 3px 8px; border-radius: 6px; white-space: nowrap;
}
.match-shirt-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,0.15);
}
.match-item.has-shirts .match-shirt-dot { background: #4caf50; }
.match-chevron { font-size: 0.7em; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
.match-item.open .match-chevron { transform: rotate(180deg); }

.match-body {
  border-top: 1px solid var(--border);
  padding: 14px; display: none;
}
.match-item.open .match-body { display: block; }

.matches-loading {
  text-align: center; padding: 28px;
  font-size: 0.85em; color: var(--text3); font-family: 'DM Mono', monospace;
}
.matches-error {
  text-align: center; padding: 20px;
  font-size: 0.82em; color: #ff7070;
}
.matches-refresh-btn {
  background: var(--surface3); border: 1px solid var(--border-strong);
  color: var(--text2); border-radius: 8px; padding: 8px 16px;
  font-size: 0.82em; font-family: 'Heebo', sans-serif; cursor: pointer;
  margin: 12px auto 0; display: block; transition: background 0.2s;
}
.matches-refresh-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

/* ── Product Picker Modal ── */
#product-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.82);
  z-index: 1000; display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(4px); padding: 20px;
}
#product-modal-overlay.open { display: flex; }

#product-modal {
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: 18px; width: 100%; max-width: 560px; max-height: 80vh;
  display: flex; flex-direction: column; animation: modalIn 0.25s ease both;
  overflow: hidden;
}
.pm-header {
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.pm-title { font-size: 1em; font-weight: 700; flex: 1; }
.pm-close {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  width: 30px; height: 30px; display: grid; place-items: center;
  cursor: pointer; color: var(--text2); font-size: 1em;
  transition: background 0.2s, color 0.2s;
}
.pm-close:hover { background: var(--surface3); color: var(--text); }

.pm-search-wrap { padding: 14px 20px 0; }
.pm-search {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 9px; padding: 10px 14px; font-size: 0.9em;
  font-family: 'Heebo', sans-serif; color: var(--text); outline: none;
  transition: border-color 0.2s; direction: rtl;
}
.pm-search:focus { border-color: rgba(255,255,255,0.35); }
.pm-search::placeholder { color: var(--text3); }

.pm-grid {
  padding: 14px 20px 20px; overflow-y: auto; flex: 1;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.pm-product {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
  display: flex; flex-direction: column;
}
.pm-product:hover { border-color: rgba(255,255,255,0.35); transform: translateY(-2px); }
.pm-product img { width: 100%; height: 90px; object-fit: cover; display: block; }
.pm-product-name {
  padding: 8px 8px 10px; font-size: 0.75em; font-weight: 600;
  color: var(--text); line-height: 1.3; flex: 1;
}
.pm-empty { grid-column: 1/-1; text-align: center; padding: 30px; color: var(--text3); font-size: 0.85em; }

/* ── Preview Strip ── */
#preview-strip {
  max-width: 660px; margin: 0 auto 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 22px; display: none;
}
.preview-title { text-align: center; color: var(--text); margin-bottom: 16px; font-weight: 700; font-size: 1em; }
.preview-countdown { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; align-items: center; }
.preview-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; text-align: center; min-width: 64px; }
.preview-num { font-size: 1.8em; font-weight: 900; display: block; line-height: 1; font-family: 'DM Mono', monospace; }
.preview-lbl { font-size: 0.62em; color: var(--text3); margin-top: 4px; display: block; font-family: 'DM Mono', monospace; }
.preview-sep { font-size: 1.4em; font-weight: 900; font-family: 'DM Mono', monospace; }

/* ── Save Btn ── */
.save-btn {
  max-width: 660px; margin: 8px auto 0; display: block; width: 100%;
  padding: 15px; background: var(--text); color: var(--bg); border: none;
  border-radius: var(--radius); font-size: 0.95em; font-weight: 700;
  font-family: 'Heebo', sans-serif; cursor: pointer;
  transition: opacity 0.2s, transform 0.15s; letter-spacing: 0.5px;
  animation: fadeSlideIn 0.5s 0.4s ease both;
}
.save-btn:hover { opacity: 0.92; transform: translateY(-1px); }
.save-btn:active { transform: scale(0.99); }
.save-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.save-btn .spinner {
  display: none; width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.2); border-top-color: var(--bg);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto;
}
.save-btn.loading .btn-text { display: none; }
.save-btn.loading .spinner { display: block; }

/* ── Toast ── */
#status-toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: 50px; padding: 10px 24px; font-weight: 600; font-size: 0.85em;
  font-family: 'DM Mono', monospace; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  opacity: 0; z-index: 2000; white-space: nowrap;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
}
#status-toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
#status-toast.success { border-color: rgba(255,255,255,0.4); color: var(--text); }
#status-toast.error   { border-color: rgba(255,100,100,0.5); color: #ff7070; }
</style>
</head>
<body>

<!-- Header -->
<div class="page-header">
  <div class="logo-mark">⚽</div>
  <div>
    <div class="page-title">הגדרות ספירה לאחור</div>
    <div class="page-sub">VIP Shirts · admin panel</div>
  </div>
</div>

<!-- Live Preview -->
<div id="preview-strip">
  <div class="preview-title" id="prev-title"></div>
  <div class="preview-countdown">
    <div class="preview-box"><span class="preview-num" id="prev-s">00</span><span class="preview-lbl">שניות</span></div>
    <span class="preview-sep" id="prev-sep1">:</span>
    <div class="preview-box"><span class="preview-num" id="prev-m">00</span><span class="preview-lbl">דקות</span></div>
    <span class="preview-sep" id="prev-sep2">:</span>
    <div class="preview-box"><span class="preview-num" id="prev-h">00</span><span class="preview-lbl">שעות</span></div>
    <span class="preview-sep" id="prev-sep3">:</span>
    <div class="preview-box"><span class="preview-num" id="prev-d">00</span><span class="preview-lbl">ימים</span></div>
  </div>
</div>

<!-- Card: הפעלה -->
<div class="card">
  <div class="card-header">
    <div class="card-icon">⚡</div>
    <div><div class="card-title">הפעלה</div></div>
  </div>
  <div class="card-body">
    <div class="toggle-row">
      <div class="toggle-info">
        <div class="toggle-label">הצג ספירה לאחור</div>
      </div>
      <label class="toggle"><input type="checkbox" id="enabled" checked><span class="slider"></span></label>
    </div>
  </div>
</div>

<!-- Card: תוכן -->
<div class="card">
  <div class="card-header">
    <div class="card-icon">✏️</div>
    <div><div class="card-title">תוכן</div></div>
  </div>
  <div class="card-body">
    <div class="field-group">
      <label>כותרת</label>
      <input type="text" id="title" placeholder="🏆 גמר המונדיאל">
    </div>
    <div class="field-group">
      <label>תאריך ושעת יעד</label>
      <input type="datetime-local" id="target-date">
    </div>
    <hr class="divider">
    <div class="field-group">
      <label>טקסט כפתור</label>
      <input type="text" id="btn-text" placeholder="לחצו לרכישה">
    </div>
    <div class="field-group" style="margin-bottom:0;">
      <label>קישור כפתור</label>
      <input type="text" id="btn-url" placeholder="#category:שם  |  #product:שם  |  https://...">
    </div>
  </div>
</div>

<!-- Card: משחקים וחולצות -->
<div class="card">
  <div class="card-header">
    <div class="card-icon">🆚</div>
    <div><div class="card-title">משחקים וחולצות</div></div>
  </div>
  <div class="card-body">

    <div class="toggle-row" style="margin-bottom:20px;">
      <div class="toggle-info">
        <div class="toggle-label">הצג ווידג'ט משחק</div>
      </div>
      <label class="toggle"><input type="checkbox" id="show-match" checked><span class="slider"></span></label>
    </div>

    <div id="matches-list-wrap">
      <div class="matches-loading" id="matches-loading">⏳ טוען משחקים מ-ESPN...</div>
      <div class="matches-list" id="matches-list" style="display:none;"></div>
      <div class="matches-error" id="matches-error" style="display:none;">
        לא ניתן לטעון משחקים
        <button class="matches-refresh-btn" onclick="loadMatches()">נסה שוב</button>
      </div>
    </div>

  </div>
</div>

<!-- Card: תמונת רקע -->
<div class="card">
  <div class="card-header">
    <div class="card-icon">🖼️</div>
    <div><div class="card-title">תמונת רקע</div></div>
  </div>
  <div class="card-body">
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="bg-file-input" accept="image/*">
      <div class="upload-icon">↑</div>
      <div class="upload-text">גרור תמונה לכאן או לחץ לבחירה</div>
      <div class="upload-sub">JPG · PNG · WEBP · עד 32MB</div>
    </div>
    <div class="upload-progress" id="upload-progress">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">מעלה...</div>
    </div>
    <div class="img-preview-wrap" id="bg-preview-wrap">
      <button class="img-clear-btn" type="button" onclick="clearBgImage()">✕</button>
      <img id="bg-preview-img" src="" alt="">
    </div>
    <input type="hidden" id="bg-image" value="">
  </div>
</div>

<!-- Card: עיצוב -->
<div class="card">
  <div class="card-header">
    <div class="card-icon">◑</div>
    <div><div class="card-title">עיצוב</div></div>
  </div>
  <div class="card-body">
    <div class="field-group">
      <label>צבע מספרים</label>
      <div class="color-row">
        <input type="color" id="num-color-picker" value="#ffffff">
        <input type="text"  id="num-color-text"   value="#ffffff" maxlength="7">
      </div>
    </div>
    <div class="field-group">
      <label>צבע רקע קוביות</label>
      <div class="color-row">
        <input type="color" id="box-color-picker" value="#000000">
        <input type="text"  id="box-color-text"   value="#000000" maxlength="7">
      </div>
    </div>
    <div class="field-group" style="margin-bottom:0;">
      <label>שקיפות שכבת כהה (0–1)</label>
      <input type="text" id="overlay-opacity" placeholder="0.45">
    </div>
  </div>
</div>

<button class="save-btn" id="save-btn" onclick="saveSettings()">
  <span class="btn-text">שמור הגדרות</span>
  <div class="spinner"></div>
</button>

<div id="status-toast"></div>

<!-- Product Picker Modal -->
<div id="product-modal-overlay">
  <div id="product-modal">
    <div class="pm-header">
      <div class="pm-title">בחר חולצה</div>
      <button class="pm-close" onclick="closeProductModal()">✕</button>
    </div>
    <div class="pm-search-wrap">
      <input type="text" class="pm-search" id="pm-search" placeholder="חפש מוצר..." oninput="filterProducts()">
    </div>
    <div class="pm-grid" id="pm-grid"></div>
  </div>
</div>

<script>
/* ── Firebase ── */
const firebaseConfig = {
  apiKey: "AIzaSyDLHENaXTeorjL87sExB1EJrH7mrEnNYOA",
  authDomain: "timetable-titus.firebaseapp.com",
  projectId: "timetable-titus",
  storageBucket: "timetable-titus.firebasestorage.app",
  messagingSenderId: "199146911555",
  appId: "1:199146911555:web:5d9436d716dfc6de7361f6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const IMGBB_API_KEY = '949918f473144748f8dea05705ac165a';

/* ── State ── */
let allProducts = [];
let allMatches  = [];
let matchShirts = {}; // { matchId: { home: {productName,image,btnText}, away: {...} } }
let currentPickerTarget = null; // { matchId, side }
let previewInterval;

/* ── Load products from Firestore ── */
async function loadProducts() {
  try {
    const snap = await db.collection('soccer_shirts').get();
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { console.error('Products load error:', e); }
}

/* ── Load matches from ESPN ── */
async function loadMatches() {
  const loading = document.getElementById('matches-loading');
  const list    = document.getElementById('matches-list');
  const errEl   = document.getElementById('matches-error');
  loading.style.display = 'block';
  list.style.display    = 'none';
  errEl.style.display   = 'none';

  try {
    const res  = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard');
    const data = await res.json();

    if (!data.events || data.events.length === 0) {
      loading.textContent = 'אין משחקים זמינים כרגע';
      return;
    }

    allMatches = data.events;
    renderMatchesList();
    loading.style.display = 'none';
    list.style.display    = 'flex';
  } catch(e) {
    console.error(e);
    loading.style.display = 'none';
    errEl.style.display   = 'block';
  }
}

function renderMatchesList() {
  const list = document.getElementById('matches-list');
  list.innerHTML = '';

  allMatches.forEach(match => {
    const comp  = match.competitions[0];
    const home  = comp.competitors.find(c => c.homeAway === 'home');
    const away  = comp.competitors.find(c => c.homeAway === 'away');
    const id    = match.id;
    const saved = matchShirts[id] || {};
    const hasShirts = !!(saved.home?.productName || saved.away?.productName);
    const isLive    = match.status.type.state === 'in';
    const isPre     = match.status.type.state === 'pre';
    const dateStr   = new Date(match.date).toLocaleDateString('he-IL', {day:'numeric',month:'numeric',hour:'2-digit',minute:'2-digit'});
    const defaultLogo = 'https://a.espncdn.com/i/teamlogos/default-soccer.png';

    const item = document.createElement('div');
    item.className = 'match-item' + (hasShirts ? ' has-shirts' : '');
    item.dataset.id = id;

    item.innerHTML = `
      <div class="match-header" onclick="toggleMatch('${id}')">
        <div class="match-teams-preview">
          <img class="match-team-logo" src="${home.team.logo || defaultLogo}" onerror="this.src='${defaultLogo}'">
          <span class="match-team-name">${home.team.shortDisplayName || home.team.displayName}</span>
          <span class="match-vs">${isLive ? home.score+' - '+away.score : 'נגד'}</span>
          <span class="match-team-name">${away.team.shortDisplayName || away.team.displayName}</span>
          <img class="match-team-logo" src="${away.team.logo || defaultLogo}" onerror="this.src='${defaultLogo}'">
        </div>
        <span class="match-date-badge">${isLive ? '🔴 LIVE' : dateStr}</span>
        <div class="match-shirt-dot" title="${hasShirts ? 'חולצות מוגדרות' : 'ללא חולצות'}"></div>
        <span class="match-chevron">▼</span>
      </div>
      <div class="match-body">
        <div class="two-col">
          <div class="shirt-card">
            <div class="shirt-card-title">חולצת בית · ${home.team.shortDisplayName || home.team.displayName}</div>
            <div class="field-group" style="margin-bottom:10px;">
              <label>טקסט כפתור</label>
              <input type="text" id="btn-home-${id}" placeholder="🛒 לחולצת הבית" value="${saved.home?.btnText||''}">
            </div>
            <label>מוצר</label>
            <div class="shirt-pick-row">
              <input type="text" id="name-home-${id}" placeholder="בחר מוצר..." readonly value="${saved.home?.productName||''}" style="cursor:pointer;" onclick="openProductModal('${id}','home')">
              <button class="pick-btn" onclick="openProductModal('${id}','home')">בחר</button>
            </div>
            <div class="shirt-selected-preview ${saved.home?.productName ? 'visible' : ''}" id="preview-home-${id}">
              <img src="${saved.home?.image||''}" id="preview-img-home-${id}">
              <span class="shirt-selected-name" id="preview-name-home-${id}">${saved.home?.productName||''}</span>
              <button class="shirt-remove-btn" onclick="removeShirt('${id}','home')">✕</button>
            </div>
          </div>
          <div class="shirt-card">
            <div class="shirt-card-title">חולצת חוץ · ${away.team.shortDisplayName || away.team.displayName}</div>
            <div class="field-group" style="margin-bottom:10px;">
              <label>טקסט כפתור</label>
              <input type="text" id="btn-away-${id}" placeholder="🛒 לחולצת החוץ" value="${saved.away?.btnText||''}">
            </div>
            <label>מוצר</label>
            <div class="shirt-pick-row">
              <input type="text" id="name-away-${id}" placeholder="בחר מוצר..." readonly value="${saved.away?.productName||''}" style="cursor:pointer;" onclick="openProductModal('${id}','away')">
              <button class="pick-btn" onclick="openProductModal('${id}','away')">בחר</button>
            </div>
            <div class="shirt-selected-preview ${saved.away?.productName ? 'visible' : ''}" id="preview-away-${id}">
              <img src="${saved.away?.image||''}" id="preview-img-away-${id}">
              <span class="shirt-selected-name" id="preview-name-away-${id}">${saved.away?.productName||''}</span>
              <button class="shirt-remove-btn" onclick="removeShirt('${id}','away')">✕</button>
            </div>
          </div>
        </div>
      </div>
    `;

    list.appendChild(item);
  });
}

function toggleMatch(id) {
  const item = document.querySelector(`.match-item[data-id="${id}"]`);
  if (!item) return;
  item.classList.toggle('open');
}

function removeShirt(matchId, side) {
  if (!matchShirts[matchId]) matchShirts[matchId] = {};
  matchShirts[matchId][side] = { productName: '', image: '', btnText: '' };
  document.getElementById(`name-${side}-${matchId}`).value = '';
  const preview = document.getElementById(`preview-${side}-${matchId}`);
  if (preview) preview.classList.remove('visible');
  updateMatchDot(matchId);
}

function updateMatchDot(matchId) {
  const saved = matchShirts[matchId] || {};
  const hasShirts = !!(saved.home?.productName || saved.away?.productName);
  const item = document.querySelector(`.match-item[data-id="${matchId}"]`);
  if (item) item.classList.toggle('has-shirts', hasShirts);
}

/* ── Product Modal ── */
function openProductModal(matchId, side) {
  currentPickerTarget = { matchId, side };
  document.getElementById('pm-search').value = '';
  renderProductGrid(allProducts);
  document.getElementById('product-modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('pm-search').focus(), 100);
}

function closeProductModal() {
  document.getElementById('product-modal-overlay').classList.remove('open');
  currentPickerTarget = null;
}

document.getElementById('product-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeProductModal();
});

function filterProducts() {
  const q = document.getElementById('pm-search').value.toLowerCase().trim();
  const filtered = q ? allProducts.filter(p => p.name.toLowerCase().includes(q)) : allProducts;
  renderProductGrid(filtered);
}

function renderProductGrid(list) {
  const grid = document.getElementById('pm-grid');
  grid.innerHTML = '';
  if (list.length === 0) {
    grid.innerHTML = '<div class="pm-empty">לא נמצאו מוצרים</div>';
    return;
  }
  list.forEach(p => {
    const el = document.createElement('div');
    el.className = 'pm-product';
    el.innerHTML = `
      <img src="${p.image||''}" alt="${p.name}" onerror="this.style.display='none'">
      <div class="pm-product-name">${p.name}</div>
    `;
    el.addEventListener('click', () => selectProduct(p));
    grid.appendChild(el);
  });
}

function selectProduct(product) {
  if (!currentPickerTarget) return;
  const { matchId, side } = currentPickerTarget;

  if (!matchShirts[matchId]) matchShirts[matchId] = {};
  if (!matchShirts[matchId][side]) matchShirts[matchId][side] = {};
  matchShirts[matchId][side].productName = product.name;
  matchShirts[matchId][side].image       = product.image || '';

  // update UI
  const nameInput = document.getElementById(`name-${side}-${matchId}`);
  if (nameInput) nameInput.value = product.name;

  const previewEl = document.getElementById(`preview-${side}-${matchId}`);
  const previewImg = document.getElementById(`preview-img-${side}-${matchId}`);
  const previewName = document.getElementById(`preview-name-${side}-${matchId}`);
  if (previewEl)   previewEl.classList.add('visible');
  if (previewImg)  previewImg.src = product.image || '';
  if (previewName) previewName.textContent = product.name;

  updateMatchDot(matchId);
  closeProductModal();
}

/* ── Sync shirt btn text from inputs before save ── */
function syncMatchShirtsFromInputs() {
  allMatches.forEach(match => {
    const id = match.id;
    const homeBtn = document.getElementById(`btn-home-${id}`);
    const awayBtn = document.getElementById(`btn-away-${id}`);
    if (homeBtn) {
      if (!matchShirts[id]) matchShirts[id] = {};
      if (!matchShirts[id].home) matchShirts[id].home = {};
      matchShirts[id].home.btnText = homeBtn.value.trim();
    }
    if (awayBtn) {
      if (!matchShirts[id]) matchShirts[id] = {};
      if (!matchShirts[id].away) matchShirts[id].away = {};
      matchShirts[id].away.btnText = awayBtn.value.trim();
    }
  });
}

/* ── Colors ── */
function syncColor(pickerId, textId) {
  const p = document.getElementById(pickerId), t = document.getElementById(textId);
  p.addEventListener('input', () => { t.value = p.value; updatePreview(); });
  t.addEventListener('input', () => { if (/^#[0-9a-fA-F]{6}$/.test(t.value)) { p.value = t.value; updatePreview(); } });
}
syncColor('num-color-picker','num-color-text');
syncColor('box-color-picker','box-color-text');

/* ── Upload ── */
const uploadZone = document.getElementById('upload-zone');
const fileInput  = document.getElementById('bg-file-input');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) uploadImage(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) uploadImage(fileInput.files[0]); });

async function uploadImage(file) {
  const progress = document.getElementById('upload-progress');
  const fill     = document.getElementById('progress-fill');
  const label    = document.getElementById('progress-label');
  progress.classList.add('active'); fill.style.width = '0%'; label.textContent = 'מעלה...';
  let fakeP = 0;
  const fakeInterval = setInterval(() => { fakeP = Math.min(fakeP + Math.random()*12, 85); fill.style.width = fakeP+'%'; }, 200);
  const formData = new FormData(); formData.append('image', file);
  try {
    const res  = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method:'POST', body:formData });
    const json = await res.json();
    clearInterval(fakeInterval);
    if (json.success) {
      fill.style.width = '100%'; label.textContent = 'הועלה ✓';
      const url = json.data.url;
      document.getElementById('bg-image').value = url;
      document.getElementById('bg-preview-img').src = url;
      document.getElementById('bg-preview-wrap').style.display = 'block';
      setTimeout(() => progress.classList.remove('active'), 1200);
      showToast('✓ תמונה הועלתה', 'success');
    } else throw new Error();
  } catch(e) { clearInterval(fakeInterval); progress.classList.remove('active'); showToast('✕ שגיאה בהעלאה', 'error'); }
}

function clearBgImage() {
  document.getElementById('bg-image').value = '';
  document.getElementById('bg-preview-wrap').style.display = 'none';
  document.getElementById('bg-preview-img').src = '';
  document.getElementById('bg-file-input').value = '';
}

/* ── Live Preview ── */
function updatePreview() {
  const dateVal = document.getElementById('target-date').value;
  const strip = document.getElementById('preview-strip');
  if (!dateVal) { strip.style.display = 'none'; return; }
  strip.style.display = 'block';

  const numColor = document.getElementById('num-color-text').value || '#fff';
  const boxColor = document.getElementById('box-color-text').value || '#000';
  document.querySelectorAll('.preview-num,.preview-sep').forEach(el => el.style.color = numColor);
  document.querySelectorAll('.preview-box').forEach(el => el.style.background = boxColor);
  document.getElementById('prev-title').textContent = document.getElementById('title').value || '';

  clearInterval(previewInterval);
  function tick() {
    const diff = new Date(dateVal) - Date.now();
    if (diff <= 0) { clearInterval(previewInterval); return; }
    document.getElementById('prev-d').textContent = String(Math.floor(diff/86400000)).padStart(2,'0');
    document.getElementById('prev-h').textContent = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
    document.getElementById('prev-m').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('prev-s').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  }
  tick(); previewInterval = setInterval(tick, 1000);
}
document.getElementById('target-date').addEventListener('input', updatePreview);
document.getElementById('title').addEventListener('input', updatePreview);

/* ── Toast ── */
function showToast(msg, type='success') {
  const t = document.getElementById('status-toast');
  t.textContent = msg; t.className = `visible ${type}`;
  setTimeout(() => t.className = '', 3500);
}

/* ── Save ── */
async function saveSettings() {
  syncMatchShirtsFromInputs();
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.classList.add('loading');

  const data = {
    enabled:        document.getElementById('enabled').checked,
    title:          document.getElementById('title').value.trim(),
    targetDate:     document.getElementById('target-date').value,
    btnText:        document.getElementById('btn-text').value.trim(),
    btnUrl:         document.getElementById('btn-url').value.trim(),
    bgImage:        document.getElementById('bg-image').value.trim(),
    numColor:       document.getElementById('num-color-text').value.trim() || '#ffffff',
    boxColor:       document.getElementById('box-color-text').value.trim() || '#000000',
    overlayOpacity: parseFloat(document.getElementById('overlay-opacity').value) || 0.45,
    showMatch:      document.getElementById('show-match').checked,
    matchShirts:    matchShirts,
    updatedAt:      firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await db.collection('Settings').doc('countdown').set(data);
    showToast('✓ נשמר בהצלחה', 'success');
  } catch(e) { showToast('✕ שגיאה בשמירה', 'error'); console.error(e); }
  finally { btn.disabled = false; btn.classList.remove('loading'); }
}

/* ── Load ── */
async function loadSettings() {
  try {
    const doc = await db.collection('Settings').doc('countdown').get();
    if (!doc.exists) return;
    const d = doc.data();
    if (d.enabled !== undefined) document.getElementById('enabled').checked = d.enabled;
    if (d.title)          document.getElementById('title').value          = d.title;
    if (d.targetDate)     document.getElementById('target-date').value    = d.targetDate;
    if (d.btnText)        document.getElementById('btn-text').value       = d.btnText;
    if (d.btnUrl)         document.getElementById('btn-url').value        = d.btnUrl;
    if (d.bgImage) {
      document.getElementById('bg-image').value = d.bgImage;
      document.getElementById('bg-preview-img').src = d.bgImage;
      document.getElementById('bg-preview-wrap').style.display = 'block';
    }
    if (d.numColor) { document.getElementById('num-color-picker').value = d.numColor; document.getElementById('num-color-text').value = d.numColor; }
    if (d.boxColor) { document.getElementById('box-color-picker').value = d.boxColor; document.getElementById('box-color-text').value = d.boxColor; }
    if (d.overlayOpacity !== undefined) document.getElementById('overlay-opacity').value = d.overlayOpacity;
    if (d.showMatch !== undefined) document.getElementById('show-match').checked = d.showMatch;
    if (d.matchShirts) {
      matchShirts = d.matchShirts;
    }
    updatePreview();
  } catch(e) { console.error(e); }
}

/* ── Init ── */
(async () => {
  await Promise.all([loadSettings(), loadProducts()]);
  await loadMatches();
})();
</script>
</body>
</html>
